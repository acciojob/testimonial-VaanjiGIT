<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Testimonial Section</title>
    <style>
        /* Main Container */
        .testimonial-container {
            background-color: #f5f5f5;
            padding: 30px;
            width: 60%;
            margin: auto;
        }

        /* Individual Testimonial Box */
        .testimonial {
            background-color: #ffffff;
            border: 1px solid #ccc;
            padding: 15px;
            margin-bottom: 15px;
        }

        /* Testimonial Text */
        .testimonial p {
            margin: 0 0 10px 0;
        }

        /* Author Name */
        .author {
            text-align: right;
            font-style: italic;
        }
    </style>
</head>
<body>

    <div class="testimonial-container">
        
        <div class="testimonial">
            <p>"This product is amazing! It really improved my workflow and productivity."</p>
            <div class="author">- John Doe</div>
        </div>

        <div class="testimonial">
            <p>"Excellent service and great support. Highly recommend to everyone!"</p>
            <div class="author">- Jane Smith</div>
        </div>

        <div class="testimonial">
            <p>"A wonderful experience from start to finish. Will definitely come back again."</p>
            <div class="author">- David Lee</div>
        </div>

    </div>

</body>
</html>
